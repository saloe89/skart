name: Build Skart APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap and pre-configure
        run: |
          npm install -g @bubblewrap/cli@latest
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore skart.keystore \
            -alias skart \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass skart123 \
            -keypass skart123 \
            -dname "CN=Skart, OU=App, O=Skart, L=Unknown, S=Unknown, C=CH"

      - name: Init and Build APK
        run: |
          mkdir apk-build && cd apk-build
          echo "n" | bubblewrap init --manifest https://skart-virid.vercel.app/manifest.json --skipPwaValidation
          echo "n" | bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true
          BUBBLEWRAP_KEYSTORE_PASSWORD: skart123
          BUBBLEWRAP_KEY_PASSWORD: skart123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skart-release-apk
          path: apk-build/app-release-signed.apk
          retention-days: 30

      - name: Print SHA256 fingerprint
        run: |
          keytool -list -v -keystore skart.keystore -alias skart -storepass skart123 | grep SHA256
