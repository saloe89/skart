name: Build Skart APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli@latest

      - name: Generate signing key
        run: |
          keytool -genkey -v \
            -keystore skart.keystore \
            -alias skart \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass skart123 \
            -keypass skart123 \
            -dname "CN=Skart, OU=App, O=Skart, L=Unknown, S=Unknown, C=CH"

      - name: Create twa-manifest.json
        run: |
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "app.vercel.skart_virid",
            "host": "skart-virid.vercel.app",
            "name": "Skart",
            "launcherName": "Skart",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#0f0f0f",
            "navigationColor": "#0c0c0e",
            "navigationColorDark": "#0c0c0e",
            "navigationDividerColor": "#0c0c0e",
            "navigationDividerColorDark": "#0c0c0e",
            "backgroundColor": "#0c0c0e",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://skart-virid.vercel.app/icon-512.png",
            "maskableIconUrl": "https://skart-virid.vercel.app/icon-512.png",
            "monochromeIconUrl": "https://skart-virid.vercel.app/icon-512.png",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "signingKey": {
              "path": "../skart.keystore",
              "alias": "skart"
            },
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://skart-virid.vercel.app/",
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://skart-virid.vercel.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": false,
            "enableSidecar": false
          }
          EOF

      - name: Build APK
        run: printf "n\n$JAVA_HOME\n" | bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: true
          BUBBLEWRAP_KEYSTORE_PASSWORD: skart123
          BUBBLEWRAP_KEY_PASSWORD: skart123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: skart-release-apk
          path: app-release-signed.apk
          retention-days: 30

      - name: Print SHA256 fingerprint
        run: |
          keytool -list -v -keystore skart.keystore -alias skart -storepass skart123 | grep SHA256
